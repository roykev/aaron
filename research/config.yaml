session:
  idle_timeout_minutes: 30
  max_session_duration_minutes: 120
  meaningful_session_min_duration_minutes: 5
  meaningful_session_min_events: 3
  meaningful_session_min_active_events: 1

events:
  # Events that count as "active learning"
  active_event_types:
    - quiz_start
    - quiz_complete
    - evaluation_start
    - evaluation_complete
    - concept_select
  # tab_change to these tabs also counts as active
  active_tab_changes:
    - search
    - concepts
    - mindmap
    - short_summary
    - long_summary
    - transcript
    - additional_material
  # All recognized feature tabs (denominator for diversity score)
  feature_tabs:
    - quiz
    - quiz_eval
    - short_summary
    - long_summary
    - mindmap
    - search
    - concepts
    - transcript
    - additional_material

active_learning_score:
  weights:
    active_weeks_ratio: 0.35
    active_events: 0.25
    feature_diversity: 0.20
    meaningful_sessions: 0.20

target:
  type: synthetic_formula   # synthetic_random | synthetic_formula | final_grade
  params:
    noise_std: 10
    seed: 42
    # For final_grade, set:
    # grades_csv: /path/to/grades.csv  (columns: email, final_grade)

federation:
  # Teacher needs emails to join their grade file — keep false.
  # Anonymisation happens on the *results* returned to Aaron Owl, not the features sent out.
  anonymize_ids: false
